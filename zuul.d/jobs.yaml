---
- nodeset:
    name: tenks-centos-10-stream
    nodes:
      - name: primary
        label: centos-10-stream-8GB

- job:
    name: tenks-tox-ansible-lint
    description: |
      Tox job that runs ansible-lint
    parent: openstack-tox
    vars:
      tox_envlist: alint
    irrelevant-files:
      - ^.*\.rst$
      - ^doc/
      - ^releasenotes/
      - ^tests/
      - ^zuul\.d/

- job:
    name: tenks-deploy-teardown-ovs-bios-centos10
    parent: tenks-deploy-teardown-ovs-bios-base
    nodeset: tenks-centos-10-stream

- job:
    name: tenks-deploy-teardown-ovs-bios-centos9s
    parent: tenks-deploy-teardown-ovs-bios-base
    nodeset: centos-9-stream

- job:
    name: tenks-deploy-teardown-ovs-bios-debian-bookworm
    parent: tenks-deploy-teardown-ovs-bios-base
    nodeset: debian-bookworm

- job:
    name: tenks-deploy-teardown-ovs-bios-rocky-9
    parent: tenks-deploy-teardown-ovs-bios-base
    nodeset: rockylinux-9

- job:
    name: tenks-deploy-teardown-ovs-bios-ubuntu-noble
    parent: tenks-deploy-teardown-ovs-bios-base
    nodeset: ubuntu-noble

- job:
    name: tenks-deploy-teardown-linuxbridge-uefi-centos10
    parent: tenks-deploy-teardown-linuxbridge-uefi-base
    nodeset: tenks-centos-10-stream

- job:
    name: tenks-deploy-teardown-linuxbridge-uefi-centos9s
    parent: tenks-deploy-teardown-linuxbridge-uefi-base
    nodeset: centos-9-stream

- job:
    name: tenks-deploy-teardown-linuxbridge-uefi-debian-bookworm
    parent: tenks-deploy-teardown-linuxbridge-uefi-base
    nodeset: debian-bookworm

- job:
    name: tenks-deploy-teardown-linuxbridge-uefi-rocky-9
    parent: tenks-deploy-teardown-linuxbridge-uefi-base
    nodeset: rockylinux-9

- job:
    name: tenks-deploy-teardown-linuxbridge-uefi-ubuntu-noble
    parent: tenks-deploy-teardown-linuxbridge-uefi-base
    nodeset: ubuntu-noble

- job:
    name: tenks-tox-codespell
    parent: openstack-tox
    timeout: 7200
    vars:
      tox_envlist: codespell
