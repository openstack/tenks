---
# The path to the virtualenv in which to install sushy-tools. Must have
# libvirt-python installed in it.
sushy_tools_virtualenv_path:
# The URL of the upper constraints file to pass to pip when installing Python
# packages.
sushy_python_upper_constraints_url:
# The identities of the nodes that the sushy-emulator is allowed to manage.
sushy_allowed_nodes: []
# The IP address that the sushy-emulator listens on.
sushy_redfish_address:
# The directory in which to store sushy-emulator logs.
sushy_log_directory:
# The URI used to connect to libvirt.
sushy_libvirt_uri:
